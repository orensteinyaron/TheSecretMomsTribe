name: System Orchestrator (manual)

# Scheduled cron removed in Agent Skills v1.0.0 (2026-05-11). The daily
# pipeline now runs via the Claude Code Routine `smt-daily-pipeline` (see
# agents/routines/README.md). `workflow_dispatch` is kept so the
# orchestrator can be re-run manually for debugging via the GitHub UI.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Orchestrator mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - hot_signal
          - resume_from_stage
          - dry_run
      signal_id:
        description: 'Signal ID (hot_signal mode only)'
        required: false
        type: string
      stage:
        description: 'Stage to resume from (resume_from_stage mode only)'
        required: false
        type: string

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run Orchestrator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node agents/orchestrator.js \
            --mode="${{ github.event.inputs.mode }}" \
            ${{ github.event.inputs.signal_id && format('--signal_id="{0}"', github.event.inputs.signal_id) || '' }} \
            ${{ github.event.inputs.stage && format('--stage="{0}"', github.event.inputs.stage) || '' }}
