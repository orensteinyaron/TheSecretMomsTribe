name: Daily Research Agent

on:
  workflow_dispatch: # Manual trigger

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run Research Agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Emergency kill switch from URL_VALIDATION_V2_SPEC §3.4/§6.
          # Set secret to "true" / "1" / "yes" to bypass URL checks.
          # Leave wired permanently as a documented escape hatch.
          SKIP_URL_VALIDATION: ${{ secrets.SKIP_URL_VALIDATION }}
        run: node agents/research.js

  trigger-content:
    needs: research
    uses: ./.github/workflows/content-gen.yml
    secrets: inherit
